<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Query Params | java Script</title>
</head>
<body>
    <form action="from_data_two.html" method="get">
        <label class="w-40 h-40 text-red-700" for="full-name">Full-Name:</label>
        <input class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" type="text" name="full-name" id="full-name" placeholder="Full-Name"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="age">Age:</label>
        <input class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" type="number" name="age" id="age" placeholder="Age"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="email">Email:</label>
        <input class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" type="text" name="email" id="email" placeholder="Example person@example.com"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="password">Password:</label>
        <input class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" type="text" name="password" id="password" placeholder="Password"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="phone-number">Phone-number:</label>
        <input class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" type="numbers" name="phone-number" id="phone-number" placeholder="Example +92 473 697 7807"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="">Which One you like:</label><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="js">java Script</label>
        <input type="radio" name="js" id="js"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="html">HTML</label>
        <input type="radio" name="html" id="html"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="css">CSS</label>
        <input type="radio" name="css" id="css"><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="">What Have You Done:</label><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="HTML">HTML</label>
        <input type="checkbox" name="HTML" id="HTML" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="CSS">CSS</label>
        <input type="checkbox" name="CSS" id="CSS" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="Tail-Wind-CSS">Tail Wind CSS</label>
        <input type="checkbox" name="Tail-Wind-CSS" id="Tail-Wind-CSS" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="PHP">PHP</label>
        <input type="checkbox" name="PHP" id="PHP" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="java-Script">java Script</label>
        <input type="checkbox" name="java-Script" id="java-Script" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" for="SQL">SQL</label>
        <input type="checkbox" name="SQL" id="SQL" placeholder=""><br>
        <br>
        <label class="w-40 h-40 text-red-700" class="w-40 h-40 text-red-700" for="Discription">Discription About Your Talient:</label>
        <br>
        <textarea class="w-80 h-10 border border-red-500 text-black hover:bg-gray-300 transition-all duration-500 rounded-md" name="Discription" id="Discription" ></textarea><br>
        <br>
        <input class="w-40 h-10 border border-red-500 text-red-500 hover:bg-gray-300 transition-all duration-500 rounded-md" type="submit">
        <input class="w-40 h-10 border border-red-500 text-red-500 hover:bg-gray-300 transition-all duration-500 rounded-md" type="reset">
    </form>
</body>
</html>
