<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <form action="form_data.html" method="get">
        <label for="first-Name">First Name:</label>
        <input type="text" name="first-Name" id="first-Name" placeholder="First Name"><br>
        <label for="last-name">Last Name:</label>
        <input type="text" name="last-name" id="last-name" placeholder="Last name"><br>
        <label for="age">Age:</label>
        <input type="number" name="age" id="age" placeholder="Age"><br>
        <label for="email">Email:</label>
        <input type="text" name="email" id="email" placeholder="Email"><br>
        <label for="password">Password:</label>
        <input type="text" name="password" id="password" placeholder="Password"><br>
        <label for="phone-number">Phone-number:</label>
        <input type="text" name="phone-number" id="phone-number" placeholder="Example +92 3150 461090"><br>
        <input type="submit">
    </form>
</body>
